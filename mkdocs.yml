site_name: Car API
site_description: Uma API REST completa para gerenciamento de carros, incluindo funcionalidades de CRUD (Create, Read, Update, Delete) e autenticação de usuários.
site_author: Chris

theme:
  name: material
  palette:
    primary: green
  font:
    text: Roboto

nav:
  - "Início": index.md
  - "Instalação e Configuração": installation_setup.md
  - "Estrutura do Projeto": project_structure.md
  - "Endpoints da API": api_endpoints.md
  - "Modelagem do Sistema": system_modeling.md
  - "Autenticação e Segurança": auth_security.md
  - "Guidelines e Contribuição": guidelines_contribution.md
  - "Release Notes": release_notes.md

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
